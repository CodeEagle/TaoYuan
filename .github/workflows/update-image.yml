name: Update TaoYuan Image

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if no new version"
        required: false
        default: false
        type: boolean
      target_version:
        description: "Target version to build. Leave empty for latest release."
        required: false
        default: ""
        type: string
      publish_to_store:
        description: "Publish to LazyCat App Store"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 */6 * * *"

env:
  UPSTREAM_REPO: setube/taoyuan
  PROJECT_NAME: TaoYuan
  PROJECT_SLUG: taoyuan
  OFFICIAL_IMAGE_REGISTRY: ghcr.io/setube/taoyuan

jobs:
  build-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve upstream version
        id: resolve-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET_VERSION="${{ inputs.target_version }}"
          RELEASE_NOTES_FILE=/tmp/release_notes.txt

          if [ -n "$TARGET_VERSION" ]; then
            VERSION="${TARGET_VERSION#v}"
            echo "Manual build for version: $VERSION"
            gh api "repos/${{ env.UPSTREAM_REPO }}/releases/tags/v$VERSION" --jq '.body // ""' > "$RELEASE_NOTES_FILE" 2>/dev/null || true
            if [ ! -s "$RELEASE_NOTES_FILE" ]; then
              printf 'Manual build for %s\n' "$VERSION" > "$RELEASE_NOTES_FILE"
            fi
          else
            RELEASE_JSON=$(gh api "repos/${{ env.UPSTREAM_REPO }}/releases/latest")
            VERSION=$(echo "$RELEASE_JSON" | jq -r '.tag_name' | sed 's/^v//')
            echo "$RELEASE_JSON" | jq -r '.body // ""' > "$RELEASE_NOTES_FILE"
            if [ ! -s "$RELEASE_NOTES_FILE" ]; then
              printf 'Auto update to %s %s\n' "${{ env.PROJECT_NAME }}" "$VERSION" > "$RELEASE_NOTES_FILE"
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_notes_file=$RELEASE_NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Check if update is needed
        id: check-update
        run: |
          CURRENT_VERSION=$(grep '^version:' lzc-manifest.yml | awk '{print $2}')
          CURRENT_IMAGE=$(grep 'image:' lzc-manifest.yml | head -1 | awk '{print $2}')
          TARGET_VERSION="${{ steps.resolve-version.outputs.version }}"

          if [ "${{ inputs.force_build }}" = "true" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          elif [[ "$CURRENT_IMAGE" != registry.lazycat.cloud/* ]]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          elif [ "$CURRENT_VERSION" != "$TARGET_VERSION" ]; then
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Current version: $CURRENT_VERSION"
          echo "Current image: $CURRENT_IMAGE"
          echo "Target version: $TARGET_VERSION"

      - name: Setup Node.js
        if: steps.check-update.outputs.update_needed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install lzc-cli
        if: steps.check-update.outputs.update_needed == 'true'
        run: npm install -g @lazycatcloud/lzc-cli

      - name: Resolve source image tag
        if: steps.check-update.outputs.update_needed == 'true'
        id: resolve-image
        run: |
          VERSION="${{ steps.resolve-version.outputs.version }}"
          CANDIDATES=(
            "${{ env.OFFICIAL_IMAGE_REGISTRY }}:$VERSION"
            "${{ env.OFFICIAL_IMAGE_REGISTRY }}:v$VERSION"
            "${{ env.OFFICIAL_IMAGE_REGISTRY }}:latest"
          )

          for IMAGE in "${CANDIDATES[@]}"; do
            if docker manifest inspect "$IMAGE" >/dev/null 2>&1; then
              echo "source_image=$IMAGE" >> "$GITHUB_OUTPUT"
              echo "Resolved source image: $IMAGE"
              exit 0
            fi
          done

          echo "No usable upstream image found"
          exit 1

      - name: Copy image to LazyCat registry
        if: steps.check-update.outputs.update_needed == 'true'
        id: copy-image
        env:
          LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
        run: |
          SOURCE_IMAGE="${{ steps.resolve-image.outputs.source_image }}"
          VERSION="${{ steps.resolve-version.outputs.version }}"

          EXISTING_IMAGE=$(lzc-cli appstore my-images 2>/dev/null | grep "/${{ env.PROJECT_SLUG }}:" | grep "$VERSION" | grep -oE 'registry\.lazycat\.cloud/[a-zA-Z0-9_/.:-]+' | head -1 || true)
          if [ -n "$EXISTING_IMAGE" ] && [ "${{ inputs.force_build }}" != "true" ]; then
            echo "accelerated_image=$EXISTING_IMAGE" >> "$GITHUB_OUTPUT"
            echo "Reusing existing LazyCat image: $EXISTING_IMAGE"
            exit 0
          fi

          set +e
          COPY_OUTPUT=$(timeout 1800 lzc-cli appstore copy-image "$SOURCE_IMAGE" 2>&1)
          COPY_STATUS=$?
          set -e

          echo "$COPY_OUTPUT"

          if [ $COPY_STATUS -ne 0 ]; then
            echo "copy-image failed"
            exit $COPY_STATUS
          fi

          ACCELERATED_IMAGE=$(echo "$COPY_OUTPUT" | grep -oE 'registry\.lazycat\.cloud/[a-zA-Z0-9_/.:-]+' | head -1 || true)
          if [ -z "$ACCELERATED_IMAGE" ]; then
            echo "Failed to parse LazyCat registry URL"
            exit 1
          fi

          echo "accelerated_image=$ACCELERATED_IMAGE" >> "$GITHUB_OUTPUT"

      - name: Update manifest
        if: steps.check-update.outputs.update_needed == 'true'
        run: |
          VERSION="${{ steps.resolve-version.outputs.version }}"
          IMAGE="${{ steps.copy-image.outputs.accelerated_image }}"

          sed -i "s/^version:.*/version: $VERSION/" lzc-manifest.yml
          sed -i "s|image: .*|image: $IMAGE|" lzc-manifest.yml

      - name: Build lpk
        if: steps.check-update.outputs.update_needed == 'true'
        env:
          LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
        run: |
          lzc-cli project build -o "${{ env.PROJECT_SLUG }}.lpk"

      - name: Publish to LazyCat App Store
        if: steps.check-update.outputs.update_needed == 'true' && inputs.publish_to_store == true
        env:
          LZC_CLI_TOKEN: ${{ secrets.LZC_CLI_TOKEN }}
        run: |
          lzc-cli appstore publish "${{ env.PROJECT_SLUG }}.lpk" --clang en -c "$(cat "${{ steps.resolve-version.outputs.release_notes_file }}")"

      - name: Upload lpk artifact
        if: steps.check-update.outputs.update_needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_SLUG }}-lpk
          path: ${{ env.PROJECT_SLUG }}.lpk

      - name: Create GitHub release
        if: steps.check-update.outputs.update_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.resolve-version.outputs.version }}"
          gh release delete "v$VERSION" --yes 2>/dev/null || true
          gh release create "v$VERSION" \
            --title "${{ env.PROJECT_NAME }} v$VERSION" \
            --notes-file "${{ steps.resolve-version.outputs.release_notes_file }}" \
            "${{ env.PROJECT_SLUG }}.lpk"

      - name: Commit manifest update
        if: steps.check-update.outputs.update_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lzc-manifest.yml

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Update TaoYuan to version ${{ steps.resolve-version.outputs.version }}"
          git push origin HEAD:${GITHUB_REF_NAME}
